name: kotlin-build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    name: kotlin build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'corretto'
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
    - name: Format
      run: cd kotlin && ./gradlew ktlintFormat
    - name: Build
      run: cd kotlin && ./gradlew build -x test
